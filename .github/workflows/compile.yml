name: Compile Typst to PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  compile:
    name: Compile main.typ
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Typst
        uses: typst-community/setup-typst@v5

      - name: Compile to PDF
        run: typst compile main.typ sponsorship.pdf
        
        
      - name: Create index.html
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>KHE Sponsorship Packet</title>
            <style>
              body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
              embed { width: 100%; height: 100%; }
            </style>
          </head>
          <body>
            <embed src="sponsorship.pdf" type="application/pdf" width="100%" height="100%">
          </body>
          </html>
          EOF
          
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: compile

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
